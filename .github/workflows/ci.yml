name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, develop]

jobs:
  test-sqlite:
    name: Test (SQLite) — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests (SQLite only)
        run: uv run pytest tests/ --ignore=tests/neo4j -q

  test-neo4j:
    name: Test (Neo4j contract)
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/graphbase
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies (with Neo4j driver)
        run: uv sync --extra dev --extra neo4j

      - name: Run Neo4j contract tests
        env:
          GRAPHBASE_BACKEND: neo4j
          GRAPHBASE_NEO4J_URI: bolt://localhost:7687
          GRAPHBASE_NEO4J_USER: neo4j
          GRAPHBASE_NEO4J_PASSWORD: graphbase
        run: uv run pytest tests/neo4j/ -v

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src/graphbase_memories --ignore-missing-imports

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --ignore=tests/neo4j --cov=src/graphbase_memories --cov-report=xml -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
