# graphbase-memories Neo4j backend (Phase 3)
#
# Usage:
#   docker compose -f docker-compose.neo4j.yml up -d
#   GRAPHBASE_BACKEND=neo4j \
#   GRAPHBASE_NEO4J_PASSWORD=graphbase \
#   graphbase
#
# Stop:
#   docker compose -f docker-compose.neo4j.yml down
#
# Data persists in ./neo4j-data/ (gitignored)

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI: http://localhost:7474
      - "7687:7687"   # Bolt (driver connection)
    environment:
      NEO4J_AUTH: "neo4j/graphbase"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1g"
      NEO4J_server_memory_pagecache_size: "256m"
    volumes:
      - ./neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "graphbase", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
