<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphbase — Graph Overview</title>
  <meta name="description" content="Interactive graph topology canvas for graphbase-memories devtools — visualise Workspace, Project, and federation edges.">
  <link rel="icon" href="data:,">
  <script src="/ui/static/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
           font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header { display: flex; align-items: center; gap: 12px; padding: 10px 20px;
             background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .back-link { color: #94a3b8; font-size: 13px; text-decoration: none; }
    .back-link:hover { color: #e2e8f0; }
    .header-sep { color: #475569; }
    .mode-badge { margin-left: auto; padding: 2px 10px; border-radius: 9999px; font-size: 11px;
                  font-weight: 600; background: #1e3a5f; color: #93c5fd; }
    .mode-badge.topology { background: #134e4a; color: #6ee7b7; }

    /* ── Body layout ────────────────────────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    aside { width: 240px; flex-shrink: 0; background: #1e293b; border-right: 1px solid #334155;
            display: flex; flex-direction: column; overflow-y: auto; padding: 14px 12px; gap: 14px; }
    aside h2 { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase;
               letter-spacing: 0.05em; margin-bottom: 6px; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-item { display: flex; align-items: center; gap: 8px; cursor: pointer;
                   padding: 3px 6px; border-radius: 4px; user-select: none; }
    .filter-item:hover { background: #334155; }
    .filter-item input[type="checkbox"] { accent-color: #3b82f6; width: 13px; height: 13px;
                                          cursor: pointer; flex-shrink: 0; }
    .filter-item span.lbl { font-size: 12px; color: #cbd5e1; flex: 1; }
    .color-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Workspace input ────────────────────────────────────────────────── */
    .ws-input-wrap { display: flex; gap: 6px; align-items: stretch; }
    .ws-input-wrap input { flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
                           border-radius: 6px; padding: 5px 8px; font-size: 12px; min-width: 0; }
    .ws-input-wrap input:focus { outline: none; border-color: #3b82f6; }
    .ws-input-wrap button { padding: 5px 9px; background: #334155; border: none; color: #e2e8f0;
                            border-radius: 6px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .ws-input-wrap button:hover { background: #3b82f6; }

    /* ── Topology toggle ────────────────────────────────────────────────── */
    .toggle-wrap { display: flex; background: #0f172a; border-radius: 6px; padding: 3px; gap: 2px; }
    .toggle-btn { flex: 1; padding: 5px; border: none; border-radius: 4px; cursor: pointer;
                  font-size: 12px; font-weight: 500; background: transparent; color: #94a3b8; }
    .toggle-btn.active { background: #1d4ed8; color: #fff; }
    .toggle-btn.active.topo { background: #0f766e; }

    /* ── Summary strip ──────────────────────────────────────────────────── */
    .summary { background: #0f172a; border-radius: 6px; padding: 8px 10px; }
    .summary-row { display: flex; justify-content: space-between; padding: 2px 0;
                   font-size: 12px; color: #94a3b8; border-bottom: 1px solid #1e293b; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row span:last-child { color: #e2e8f0; font-weight: 500; }
    .summary-total { font-size: 11px; color: #475569; margin-top: 6px; text-align: center; }

    button.btn-refresh { width: 100%; padding: 6px; background: #334155; border: none;
                         color: #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 12px; }
    button.btn-refresh:hover { background: #3b82f6; }
    button.btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Canvas area ────────────────────────────────────────────────────── */
    .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #graph { width: 100%; height: 100%; }
    .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center;
                       justify-content: center; background: #0f172a; z-index: 10; flex-direction: column; gap: 8px; }
    .loading-overlay p { color: #94a3b8; font-size: 14px; }
    .loading-overlay small { color: #475569; font-size: 12px; }
    .error-overlay { position: absolute; inset: 0; display: flex; align-items: center;
                     justify-content: center; background: #0f172a; z-index: 10; flex-direction: column; gap: 8px; }
    .error-overlay p { color: #fca5a5; font-size: 14px; }
    .error-overlay small { color: #64748b; font-size: 12px; }

    /* ── Inspect panel ──────────────────────────────────────────────────── */
    #inspect { position: absolute; bottom: 0; left: 0; right: 0; background: #1e293b;
               border-top: 1px solid #334155; padding: 12px 20px; display: none;
               flex-wrap: wrap; gap: 16px; align-items: flex-start; z-index: 5; }
    #inspect.visible { display: flex; }
    .inspect-field { display: flex; flex-direction: column; gap: 2px; }
    .inspect-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
    .inspect-value { font-size: 13px; color: #e2e8f0; font-weight: 500; max-width: 200px;
                     overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inspect-value.wrap { white-space: normal; max-width: 360px; line-height: 1.4; font-weight: 400; }
    .inspect-badge { display: inline-block; padding: 1px 8px; border-radius: 9999px;
                     font-size: 11px; font-weight: 600; }
    .badge-project      { background: #1e3a5f; color: #93c5fd; }
    .badge-workspace    { background: #4c1d95; color: #c4b5fd; }
    .badge-entityfact   { background: #0c4a6e; color: #7dd3fc; }
    .badge-stale        { background: #78350f; color: #fde68a; }
    .badge-fresh        { background: #166534; color: #86efac; }
    .badge-category     { background: #1c1917; color: #d4d4aa; border: 1px solid #44403c; }
    .counts-table { display: flex; gap: 10px; flex-wrap: wrap; }
    .count-item { text-align: center; }
    .count-num { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .count-lbl { font-size: 10px; color: #64748b; }
    .inspect-close { margin-left: auto; background: none; border: none; color: #64748b;
                     cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
    .inspect-close:hover { color: #e2e8f0; }

    /* ── Canvas controls (top-right floating buttons) ──────────────────── */
    .canvas-controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 6; }
    .ctrl-btn { padding: 5px 10px; background: #1e293b; border: 1px solid #334155; color: #94a3b8;
                border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
                transition: background 0.15s, color 0.15s; }
    .ctrl-btn:hover { background: #334155; color: #e2e8f0; }
    .ctrl-btn.physics-on { border-color: #22c55e; color: #4ade80; }

    /* ── Topology-only sections ─────────────────────────────────────────── */
    .topo-section { display: none; }
    .topo-section.visible { display: block; }
    .collapsed-section { display: block; }
    .collapsed-section.hidden { display: none; }

    /* ── Divider ────────────────────────────────────────────────────────── */
    .sidebar-divider { border: none; border-top: 1px solid #334155; margin: 0; }
  </style>
</head>
<body>
  <header>
    <a href="/ui/index.html" class="back-link">← Devtools</a>
    <span class="header-sep">/</span>
    <h1>Graph Overview</h1>
    <span class="mode-badge" id="mode-badge">Collapsed</span>
  </header>

  <div class="body">
    <!-- Sidebar -->
    <aside>
      <!-- Workspace scope input -->
      <div>
        <h2>Workspace</h2>
        <div class="ws-input-wrap">
          <input id="ws-input" type="text" placeholder="workspace id…" title="Filter graph by workspace ID">
          <button id="ws-apply" title="Apply workspace filter">Go</button>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- View mode toggle -->
      <div>
        <h2>View Mode</h2>
        <div class="toggle-wrap">
          <button class="toggle-btn active" id="btn-collapsed" title="Show Workspace + Project nodes only">Collapsed</button>
          <button class="toggle-btn topo"   id="btn-topology"  title="Show full EntityFact service topology">Topology</button>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Collapsed-mode: node type filters -->
      <div class="collapsed-section" id="sec-collapsed-nodes">
        <h2>Node Types</h2>
        <div class="filter-group" id="node-filters">
          <label class="filter-item">
            <input type="checkbox" checked data-filter="node" data-label="Workspace">
            <span class="color-dot" aria-hidden="true" style="background:#7c3aed"></span>
            <span class="lbl">Workspace</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="node" data-label="Project">
            <span class="color-dot" aria-hidden="true" style="background:#2563eb"></span>
            <span class="lbl">Project</span>
          </label>
        </div>
      </div>

      <!-- Topology-mode: EntityFact category filters -->
      <div class="topo-section" id="sec-topo-nodes">
        <h2>Categories</h2>
        <div class="filter-group" id="category-filters">
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="Service">
            <span class="color-dot" aria-hidden="true" style="background:#0ea5e9"></span>
            <span class="lbl">Service</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="BoundedContext">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">BoundedContext</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="Topic">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">Topic</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="DataStore">
            <span class="color-dot" aria-hidden="true" style="background:#8b5cf6"></span>
            <span class="lbl">DataStore</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="External">
            <span class="color-dot" aria-hidden="true" style="background:#f97316"></span>
            <span class="lbl">External</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="Feature">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">Feature</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="DataSource">
            <span class="color-dot" aria-hidden="true" style="background:#8b5cf6"></span>
            <span class="lbl">DataSource</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="category" data-category="MessageQueue">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">MessageQueue</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" data-filter="category" data-category="EntityFact">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">Other</span>
          </label>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Collapsed-mode: edge type filters -->
      <div class="collapsed-section" id="sec-collapsed-edges">
        <h2>Edge Types</h2>
        <div class="filter-group" id="edge-filters">
          <label class="filter-item">
            <input type="checkbox" checked data-filter="edge" data-edge="MEMBER_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">MEMBER_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="edge" data-edge="CROSS_SERVICE_LINK">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">CROSS_SERVICE_LINK</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="edge" data-edge="AFFECTS">
            <span class="color-dot" aria-hidden="true" style="background:#ef4444"></span>
            <span class="lbl">AFFECTS</span>
          </label>
        </div>
      </div>

      <!-- Topology-mode: edge type filters -->
      <div class="topo-section" id="sec-topo-edges">
        <h2>Edge Types</h2>
        <div class="filter-group" id="topo-edge-filters">
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="MEMBER_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">MEMBER_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="BELONGS_TO">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">BELONGS_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="INVOLVES">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">INVOLVES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="CONSUMES">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">CONSUMES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="PRODUCES">
            <span class="color-dot" aria-hidden="true" style="background:#3b82f6"></span>
            <span class="lbl">PRODUCES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="READS">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">READS</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="WRITES">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">WRITES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="CONFLICTS_WITH">
            <span class="color-dot" aria-hidden="true" style="background:#ef4444"></span>
            <span class="lbl">CONFLICTS_WITH</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="MERGES_INTO">
            <span class="color-dot" aria-hidden="true" style="background:#a78bfa"></span>
            <span class="lbl">MERGES_INTO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="CALLS_DOWNSTREAM">
            <span class="color-dot" aria-hidden="true" style="background:#3b82f6"></span>
            <span class="lbl">CALLS_DOWNSTREAM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="CALLS_UPSTREAM">
            <span class="color-dot" aria-hidden="true" style="background:#6366f1"></span>
            <span class="lbl">CALLS_UPSTREAM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="READS_FROM">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">READS_FROM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="WRITES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">WRITES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="PUBLISHES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">PUBLISHES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="SUBSCRIBES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#06b6d4"></span>
            <span class="lbl">SUBSCRIBES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="MEMBER_OF_CONTEXT">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">MEMBER_OF_CONTEXT</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="PART_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">PART_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-filter="topo-edge" data-edge="HAS_FEATURE">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">HAS_FEATURE</span>
          </label>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Summary -->
      <div>
        <h2>Summary</h2>
        <div class="summary" id="summary-panel"><!-- injected by updateSummary() --></div>
        <p class="summary-total" id="total-label"></p>
      </div>

      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
    </aside>

    <!-- Canvas -->
    <main class="canvas-wrap">
      <div class="loading-overlay" id="loading">
        <p>Loading graph…</p>
        <small id="loading-hint"></small>
      </div>
      <div class="error-overlay" id="error-panel" style="display:none">
        <p id="error-msg">Failed to load graph data.</p>
        <small>Is the devtools server running at port 8765?</small>
      </div>
      <div id="graph" role="img" aria-label="Interactive graph canvas — click nodes to inspect"></div>

      <!-- Canvas controls -->
      <div class="canvas-controls">
        <button class="ctrl-btn" id="btn-fit" title="Fit all nodes into view">⊡ Fit</button>
        <button class="ctrl-btn" id="btn-physics" title="Toggle force-directed physics">⚡ Physics</button>
      </div>

      <!-- Inspect panel -->
      <div id="inspect">
        <div class="inspect-field">
          <span class="inspect-label">ID</span>
          <span class="inspect-value" id="insp-id">—</span>
        </div>
        <div class="inspect-field">
          <span class="inspect-label">Label</span>
          <span id="insp-label-badge" class="inspect-badge">—</span>
        </div>
        <div class="inspect-field" id="insp-category-wrap" style="display:none">
          <span class="inspect-label">Category</span>
          <span id="insp-category-badge" class="inspect-badge badge-category">—</span>
        </div>
        <div class="inspect-field">
          <span class="inspect-label">Display</span>
          <span class="inspect-value" id="insp-display">—</span>
        </div>
        <div class="inspect-field" id="insp-fact-wrap" style="display:none">
          <span class="inspect-label">Fact</span>
          <span class="inspect-value wrap" id="insp-fact">—</span>
        </div>
        <div class="inspect-field" id="insp-stale-wrap">
          <span class="inspect-label">Staleness</span>
          <span id="insp-stale-badge" class="inspect-badge">—</span>
        </div>
        <div class="inspect-field" id="insp-counts-wrap" style="display:none">
          <span class="inspect-label">Node Counts</span>
          <div class="counts-table" id="insp-counts"></div>
        </div>
        <button class="inspect-close" id="inspect-close">✕</button>
      </div>
    </main>
  </div>

  <script src="/ui/static/graph.js"></script>
</body>
</html>
