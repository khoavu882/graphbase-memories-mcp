<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphbase — Graph Overview</title>
  <meta name="description" content="Interactive graph topology canvas for graphbase-memories devtools — visualise Workspace, Project, and federation edges.">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="static/tokens.css">
  <script src="/ui/static/vis-network.min.js"></script>
  <script>
    if (new URLSearchParams(window.location.search).get("embedded") === "1") {
      document.documentElement.classList.add("graph-embedded");
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary);
           font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header { display: flex; align-items: center; gap: 12px; padding: 10px 20px;
             background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    header h1 { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-bright); }
    .back-link { color: var(--text-secondary); font-size: 13px; text-decoration: none; }
    .back-link:hover { color: var(--text-primary); }
    .header-sep { color: var(--text-dim); }
    .mode-badge { margin-left: auto; padding: 2px 10px; border-radius: 9999px; font-size: 11px;
                  font-weight: 600; background: #1e3a5f; color: #93c5fd; }
    .mode-badge.topology { background: #134e4a; color: #6ee7b7; }
    #btn-theme { padding: 3px 10px; background: var(--bg-raised); border: 1px solid var(--border);
                 color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 11px;
                 font-weight: 500; transition: background 0.15s, color 0.15s; }
    #btn-theme:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Body layout ────────────────────────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    #sidebar { width: 240px; flex-shrink: 0; background: var(--bg-surface); border-right: 1px solid var(--border);
               display: flex; flex-direction: column; overflow-y: auto; padding: 14px 12px; gap: 14px; }
    #sidebar h2 { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;
                  letter-spacing: 0.05em; margin-bottom: 6px; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-item { display: flex; align-items: center; gap: 8px; cursor: pointer;
                   padding: 3px 6px; border-radius: 4px; user-select: none; }
    .filter-item:hover { background: var(--bg-raised); }
    .filter-item input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px;
                                          cursor: pointer; flex-shrink: 0; }
    .filter-item span.lbl { font-size: 12px; color: var(--text-muted); flex: 1; }
    .color-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Workspace input ────────────────────────────────────────────────── */
    .ws-input-wrap { display: flex; gap: 6px; align-items: stretch; }
    .ws-input-wrap input { flex: 1; background: var(--bg-base); border: 1px solid var(--text-dim); color: var(--text-primary);
                           border-radius: 6px; padding: 5px 8px; font-size: 12px; min-width: 0; }
    .ws-input-wrap input:focus { outline: none; border-color: var(--accent); }
    .ws-input-wrap button { padding: 5px 9px; background: var(--bg-raised); border: none; color: var(--text-primary);
                            border-radius: 6px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .ws-input-wrap button:hover { background: var(--accent); }

    /* ── Topology toggle ────────────────────────────────────────────────── */
    .toggle-wrap { display: flex; background: var(--bg-base); border-radius: 6px; padding: 3px; gap: 2px; }
    .toggle-btn { flex: 1; padding: 5px; border: none; border-radius: 4px; cursor: pointer;
                  font-size: 12px; font-weight: 500; background: transparent; color: var(--text-secondary); }
    .toggle-btn.active { background: var(--accent-strong); color: #fff; }
    .toggle-btn.active.topo { background: #0f766e; }

    /* ── Summary strip ──────────────────────────────────────────────────── */
    .summary { background: var(--bg-base); border-radius: 6px; padding: 8px 10px; }
    .summary-row { display: flex; justify-content: space-between; padding: 2px 0;
                   font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--bg-surface); }
    .summary-row:last-child { border-bottom: none; }
    .summary-row span:last-child { color: var(--text-primary); font-weight: 500; }
    .summary-total { font-size: 11px; color: var(--text-secondary); margin-top: 6px; text-align: center; }

    button.btn-refresh { width: 100%; padding: 6px; background: var(--bg-raised); border: none;
                         color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 12px; }
    button.btn-refresh:hover { background: var(--accent); }
    button.btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Canvas area ────────────────────────────────────────────────────── */
    .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #graph { width: 100%; height: 100%; background: var(--bg-base); }
    .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center;
                       justify-content: center; background: var(--bg-base); z-index: 10; flex-direction: column; gap: 8px; }
    .loading-overlay p { color: var(--text-secondary); font-size: 14px; }
    .loading-overlay small { color: var(--text-dim); font-size: 12px; }
    .error-overlay { position: absolute; inset: 0; display: flex; align-items: center;
                     justify-content: center; background: var(--bg-base); z-index: 10; flex-direction: column; gap: 8px; }
    .error-overlay p { color: var(--text-error); font-size: 14px; }
    .error-overlay small { color: var(--text-subdued); font-size: 12px; }

    /* ── Shared badge classes (used by detail panel header) ─────────────── */
    .inspect-badge { display: inline-block; padding: 1px 8px; border-radius: 9999px;
                     font-size: 11px; font-weight: 600; }
    .badge-project      { background: #1e3a5f; color: #93c5fd; }
    .badge-workspace    { background: #4c1d95; color: #c4b5fd; }
    .badge-entityfact   { background: #0c4a6e; color: #7dd3fc; }
    .badge-stale        { background: #78350f; color: #fde68a; }
    .badge-fresh        { background: #166534; color: #86efac; }
    .badge-category     { background: #1c1917; color: #d4d4aa; border: 1px solid #44403c; }
    .badge-cluster      { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; }

    /* ── Canvas controls (top-right floating buttons) ──────────────────── */
    .canvas-controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 6;
                       flex-wrap: wrap; justify-content: flex-end; max-width: min(520px, calc(100% - 24px)); }
    .ctrl-btn { padding: 5px 10px; background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-secondary);
                border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
                transition: background 0.15s, color 0.15s; }
    .ctrl-btn:hover { background: var(--bg-raised); color: var(--text-primary); }
    .ctrl-btn.physics-on { border-color: #22c55e; color: #4ade80; }

    .cluster-status {
      position: absolute;
      left: 12px;
      top: 48px;
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: min(720px, calc(100% - 360px));
      padding: 8px 10px;
      background: color-mix(in srgb, var(--bg-surface) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(10px);
    }
    .cluster-status[hidden] { display: none; }
    .cluster-copy {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cluster-title { font-size: 11px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; letter-spacing: 0.05em; }
    .cluster-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
    .cluster-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Topology-only sections ─────────────────────────────────────────── */
    .topo-section { display: none; }
    .topo-section.visible { display: block; }
    .collapsed-section { display: block; }
    .collapsed-section.hidden { display: none; }

    /* ── Divider ────────────────────────────────────────────────────────── */
    .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* ── Detail panel (right-side overlay inside .canvas-wrap) ──────────── */
    #detail-panel {
      position: absolute; top: 0; right: 0; height: 100%; width: 320px; z-index: 8;
      background: var(--bg-surface); border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      display: flex; flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #detail-panel::-webkit-scrollbar { width: 6px; }
    #detail-panel::-webkit-scrollbar-track { background: transparent; }
    #detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #detail-panel.open { transform: translateX(0); }

    /* ── Detail panel header ─────────────────────────────────────────────── */
    .dp-header { display: flex; align-items: center; gap: 8px; padding: 12px 14px 10px;
                 flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .dp-close { margin-left: auto; background: none; border: none; color: var(--text-subdued);
                cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
    .dp-close:hover { color: var(--text-primary); }

    /* ── Detail section ──────────────────────────────────────────────────── */
    .dp-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .dp-section h3 { font-size: 10px; font-weight: 600; text-transform: uppercase;
                     letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 8px; }
    .dp-field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .dp-field:last-child { margin-bottom: 0; }
    .dp-label { font-size: 10px; color: var(--text-subdued); text-transform: uppercase; letter-spacing: 0.04em; }
    .dp-value { font-size: 13px; color: var(--text-primary); line-height: 1.45; word-break: break-word; }
    .dp-value.fact { font-size: 12px; white-space: pre-wrap; word-break: break-word;
                     line-height: 1.5; max-height: 140px; overflow-y: auto; color: var(--text-muted); }
    .dp-id-row { display: flex; align-items: center; gap: 6px; }
    .dp-id-row .dp-value { font-size: 12px; color: var(--text-secondary); flex: 1; overflow: hidden;
                           text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { flex-shrink: 0; padding: 2px 8px; font-size: 11px; border: 1px solid var(--border);
                border-radius: 4px; background: transparent; color: var(--text-subdued); cursor: pointer; }
    .copy-btn:hover { border-color: var(--accent); color: var(--text-primary); }

    /* ── Freshness bar ───────────────────────────────────────────────────── */
    .freshness-bar { height: 4px; border-radius: 2px; background: var(--bg-base); margin-top: 6px; }
    .freshness-fill { height: 100%; border-radius: 2px; }

    /* ── Badge count rows ────────────────────────────────────────────────── */
    .dp-count-row { display: flex; justify-content: space-between; align-items: center;
                    padding: 3px 0; font-size: 12px; color: var(--text-secondary);
                    border-bottom: 1px solid var(--bg-surface); }
    .dp-count-row:last-child { border-bottom: none; }
    .dp-count-row span:last-child { color: var(--text-bright); font-weight: 600; }

    /* ── Edge summary rows ───────────────────────────────────────────────── */
    .dp-edge-row { display: flex; justify-content: space-between; align-items: center;
                   padding: 2px 0; font-size: 11px; color: var(--text-secondary); }
    .dp-edge-dir { font-size: 10px; color: var(--text-dim); margin-right: 4px; }
    .dp-edge-count { font-weight: 600; color: var(--text-primary); }

    /* ── Neighbor chips ──────────────────────────────────────────────────── */
    .dp-neighbor-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .neighbor-chip { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--bg-base);
                     border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer;
                     transition: border-color 0.1s, color 0.1s; }
    .neighbor-chip:hover { border-color: var(--accent); color: var(--text-primary); }
    .neighbor-chip:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    /* ── Focus mode indicator (top-left of canvas) ───────────────────────── */
    .focus-indicator { position: absolute; top: 12px; left: 12px; z-index: 7;
                       padding: 4px 12px; border-radius: 9999px; background: var(--accent-strong);
                       color: #fff; font-size: 11px; font-weight: 600;
                       display: none; pointer-events: none; }
    .focus-indicator.visible { display: block; }

    html.graph-embedded,
    html.graph-embedded body {
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
    }
    html.graph-embedded header { display: none; }
    html.graph-embedded .body {
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }
    html.graph-embedded .canvas-wrap,
    html.graph-embedded #graph {
      min-height: 0;
    }
  </style>
</head>
<body>
  <header>
    <a href="/ui/index.html" class="back-link">← Devtools</a>
    <span class="header-sep">/</span>
    <h1>Graph Overview</h1>
    <span class="mode-badge" id="mode-badge">Collapsed</span>
    <button id="btn-theme" title="Toggle light/dark theme">☀ Light</button>
  </header>

  <div class="body">
    <!-- Sidebar -->
    <aside id="sidebar">
      <!-- Workspace scope input -->
      <div>
        <h2>Workspace</h2>
        <div class="ws-input-wrap">
          <input id="ws-input" name="workspace_id" type="text" placeholder="workspace id…" title="Filter graph by workspace ID">
          <button id="ws-apply" title="Apply workspace filter">Go</button>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- View mode toggle -->
      <div>
        <h2>View Mode</h2>
        <div class="toggle-wrap">
          <button class="toggle-btn active" id="btn-collapsed" title="Show Workspace + Project nodes only">Collapsed</button>
          <button class="toggle-btn topo"   id="btn-topology"  title="Show full EntityFact service topology">Topology</button>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Collapsed-mode: node type filters -->
      <div class="collapsed-section" id="sec-collapsed-nodes">
        <h2>Node Types</h2>
        <div class="filter-group" id="node-filters">
          <label class="filter-item">
            <input type="checkbox" name="node_workspace" checked data-filter="node" data-label="Workspace">
            <span class="color-dot" aria-hidden="true" style="background:#7c3aed"></span>
            <span class="lbl">Workspace</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="node_project" checked data-filter="node" data-label="Project">
            <span class="color-dot" aria-hidden="true" style="background:#2563eb"></span>
            <span class="lbl">Project</span>
          </label>
        </div>
      </div>

      <!-- Topology-mode: EntityFact category filters -->
      <div class="topo-section" id="sec-topo-nodes">
        <h2>Categories</h2>
        <div class="filter-group" id="category-filters">
          <label class="filter-item">
            <input type="checkbox" name="category_service" checked data-filter="category" data-category="Service">
            <span class="color-dot" aria-hidden="true" style="background:#0ea5e9"></span>
            <span class="lbl">Service</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_bounded_context" checked data-filter="category" data-category="BoundedContext">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">BoundedContext</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_topic" checked data-filter="category" data-category="Topic">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">Topic</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_data_store" checked data-filter="category" data-category="DataStore">
            <span class="color-dot" aria-hidden="true" style="background:#8b5cf6"></span>
            <span class="lbl">DataStore</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_external" checked data-filter="category" data-category="External">
            <span class="color-dot" aria-hidden="true" style="background:#f97316"></span>
            <span class="lbl">External</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_feature" checked data-filter="category" data-category="Feature">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">Feature</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_data_source" checked data-filter="category" data-category="DataSource">
            <span class="color-dot" aria-hidden="true" style="background:#8b5cf6"></span>
            <span class="lbl">DataSource</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_message_queue" checked data-filter="category" data-category="MessageQueue">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">MessageQueue</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="category_entity_fact" data-filter="category" data-category="EntityFact">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">Other</span>
          </label>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Collapsed-mode: edge type filters -->
      <div class="collapsed-section" id="sec-collapsed-edges">
        <h2>Edge Types</h2>
        <div class="filter-group" id="edge-filters">
          <label class="filter-item">
            <input type="checkbox" name="edge_member_of" checked data-filter="edge" data-edge="MEMBER_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">MEMBER_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="edge_cross_service_link" checked data-filter="edge" data-edge="CROSS_SERVICE_LINK">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">CROSS_SERVICE_LINK</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="edge_affects" checked data-filter="edge" data-edge="AFFECTS">
            <span class="color-dot" aria-hidden="true" style="background:#ef4444"></span>
            <span class="lbl">AFFECTS</span>
          </label>
        </div>
      </div>

      <!-- Topology-mode: edge type filters -->
      <div class="topo-section" id="sec-topo-edges">
        <h2>Edge Types</h2>
        <div class="filter-group" id="topo-edge-filters">
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_member_of" checked data-filter="topo-edge" data-edge="MEMBER_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">MEMBER_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_belongs_to" checked data-filter="topo-edge" data-edge="BELONGS_TO">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">BELONGS_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_involves" checked data-filter="topo-edge" data-edge="INVOLVES">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">INVOLVES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_consumes" checked data-filter="topo-edge" data-edge="CONSUMES">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">CONSUMES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_produces" checked data-filter="topo-edge" data-edge="PRODUCES">
            <span class="color-dot" aria-hidden="true" style="background:#3b82f6"></span>
            <span class="lbl">PRODUCES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_reads" checked data-filter="topo-edge" data-edge="READS">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">READS</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_writes" checked data-filter="topo-edge" data-edge="WRITES">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">WRITES</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_conflicts_with" checked data-filter="topo-edge" data-edge="CONFLICTS_WITH">
            <span class="color-dot" aria-hidden="true" style="background:#ef4444"></span>
            <span class="lbl">CONFLICTS_WITH</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_merges_into" checked data-filter="topo-edge" data-edge="MERGES_INTO">
            <span class="color-dot" aria-hidden="true" style="background:#a78bfa"></span>
            <span class="lbl">MERGES_INTO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_calls_downstream" checked data-filter="topo-edge" data-edge="CALLS_DOWNSTREAM">
            <span class="color-dot" aria-hidden="true" style="background:#3b82f6"></span>
            <span class="lbl">CALLS_DOWNSTREAM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_calls_upstream" checked data-filter="topo-edge" data-edge="CALLS_UPSTREAM">
            <span class="color-dot" aria-hidden="true" style="background:#6366f1"></span>
            <span class="lbl">CALLS_UPSTREAM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_reads_from" checked data-filter="topo-edge" data-edge="READS_FROM">
            <span class="color-dot" aria-hidden="true" style="background:#94a3b8"></span>
            <span class="lbl">READS_FROM</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_writes_to" checked data-filter="topo-edge" data-edge="WRITES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">WRITES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_publishes_to" checked data-filter="topo-edge" data-edge="PUBLISHES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#10b981"></span>
            <span class="lbl">PUBLISHES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_subscribes_to" checked data-filter="topo-edge" data-edge="SUBSCRIBES_TO">
            <span class="color-dot" aria-hidden="true" style="background:#06b6d4"></span>
            <span class="lbl">SUBSCRIBES_TO</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_member_of_context" checked data-filter="topo-edge" data-edge="MEMBER_OF_CONTEXT">
            <span class="color-dot" aria-hidden="true" style="background:#f59e0b"></span>
            <span class="lbl">MEMBER_OF_CONTEXT</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_part_of" checked data-filter="topo-edge" data-edge="PART_OF">
            <span class="color-dot" aria-hidden="true" style="background:#475569"></span>
            <span class="lbl">PART_OF</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" name="topo_edge_has_feature" checked data-filter="topo-edge" data-edge="HAS_FEATURE">
            <span class="color-dot" aria-hidden="true" style="background:#ec4899"></span>
            <span class="lbl">HAS_FEATURE</span>
          </label>
        </div>
      </div>

      <hr class="sidebar-divider">

      <!-- Summary -->
      <div>
        <h2>Summary</h2>
        <div class="summary" id="summary-panel"><!-- injected by updateSummary() --></div>
        <p class="summary-total" id="total-label"></p>
      </div>

      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
    </aside>

    <!-- Canvas -->
    <main class="canvas-wrap">
      <div class="loading-overlay" id="loading">
        <p>Loading graph…</p>
        <small id="loading-hint"></small>
      </div>
      <div class="error-overlay" id="error-panel" style="display:none">
        <p id="error-msg">Failed to load graph data.</p>
        <small>Is the devtools server running at port 8765?</small>
      </div>
      <div id="graph" role="img" aria-label="Interactive graph canvas — click a node to inspect, double-click to focus"></div>

      <!-- Canvas controls -->
      <div class="canvas-controls">
        <button class="ctrl-btn" id="btn-fit" title="Fit all nodes into view">⊡ Fit</button>
        <button class="ctrl-btn" id="btn-physics" title="Toggle force-directed physics">⚡ Physics</button>
        <button class="ctrl-btn" id="btn-export-json" title="Download the currently visible subgraph as JSON">Export JSON</button>
        <button class="ctrl-btn" id="btn-export-csv" title="Download the currently visible subgraph as CSV">Export CSV</button>
      </div>

      <div class="cluster-status" id="cluster-status" hidden>
        <div class="cluster-copy">
          <span class="cluster-title">Large Graph Clustering</span>
          <span class="cluster-summary" id="cluster-summary"></span>
        </div>
        <div class="cluster-actions">
          <button class="ctrl-btn" id="btn-expand-clusters" type="button" hidden>Expand All</button>
          <button class="ctrl-btn" id="btn-reset-clusters" type="button" hidden>Re-cluster</button>
        </div>
      </div>

      <!-- Focus mode indicator -->
      <div class="focus-indicator" id="focus-indicator"
           title="Press Escape or F, or double-click the node again to exit focus mode">
        ⊙ Focus
      </div>

      <!-- Detail panel (replaces #inspect bottom strip) -->
      <aside id="detail-panel" role="complementary" aria-label="Node detail">
        <div class="dp-header">
          <span id="dp-type-badge" class="inspect-badge">—</span>
          <button class="dp-close" id="dp-close" aria-label="Close detail panel">✕</button>
        </div>
        <div class="dp-section" id="dp-section-id">
          <h3>Identity</h3>
          <div class="dp-field">
            <span class="dp-label">ID</span>
            <div class="dp-id-row">
              <span class="dp-value" id="dp-id">—</span>
              <button class="copy-btn" id="dp-copy" aria-label="Copy node ID" title="Copy ID to clipboard">Copy</button>
            </div>
          </div>
          <div class="dp-field">
            <span class="dp-label">Display Name</span>
            <span class="dp-value" id="dp-display">—</span>
          </div>
          <div class="dp-field">
            <button class="copy-btn" id="dp-full-detail" aria-label="Open full node detail in Devtools">
              View Full Detail
            </button>
          </div>
        </div>
        <div class="dp-section" id="dp-section-meta">
          <!-- renderMetaSection() output injected by JS -->
        </div>
        <div class="dp-section" id="dp-section-edges" style="display:none">
          <h3>Connections</h3>
          <div id="dp-edge-list"></div>
        </div>
        <div class="dp-section" id="dp-section-neighbors" style="display:none">
          <h3>Neighbors</h3>
          <div class="dp-neighbor-chips" id="dp-neighbor-chips"></div>
        </div>
      </aside>
    </main>
  </div>

  <script src="/ui/static/graph.js"></script>
</body>
</html>
